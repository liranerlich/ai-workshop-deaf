<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="ag1" x1="0" x2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#FAF5FF"/>
  <!-- canvas background grid -->
  <g opacity="0.4">
    <path d="M 0 80 L 800 80 M 0 160 L 800 160 M 0 240 L 800 240 M 0 320 L 800 320 M 0 400 L 800 400 M 0 480 L 800 480 M 0 560 L 800 560" stroke="#E9D5FF" stroke-width="1"/>
    <path d="M 80 0 L 80 600 M 160 0 L 160 600 M 240 0 L 240 600 M 320 0 L 320 600 M 400 0 L 400 600 M 480 0 L 480 600 M 560 0 L 560 600 M 640 0 L 640 600 M 720 0 L 720 600" stroke="#E9D5FF" stroke-width="1"/>
  </g>
  <!-- top toolbar -->
  <rect x="0" y="0" width="800" height="50" fill="#FFFFFF"/>
  <rect x="40" y="18" width="120" height="14" rx="4" fill="url(#ag1)"/>
  <rect x="640" y="14" width="120" height="22" rx="11" fill="url(#ag1)"/>
  <!-- connectors -->
  <g stroke="#8B5CF6" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 200 170 C 280 170, 280 300, 360 300"/>
    <path d="M 480 300 C 560 300, 560 170, 640 170"/>
    <path d="M 480 300 C 560 300, 560 430, 640 430"/>
  </g>
  <!-- node 1: trigger -->
  <g>
    <rect x="60" y="120" width="160" height="100" rx="14" fill="#FFFFFF" stroke="url(#ag1)" stroke-width="2"/>
    <circle cx="92" cy="152" r="16" fill="#FBBF24" opacity="0.25"/>
    <text x="92" y="160" text-anchor="middle" font-family="Arial" font-size="18">⚡</text>
    <rect x="116" y="142" width="80" height="10" rx="5" fill="#0B1B3B"/>
    <rect x="116" y="158" width="60" height="6" rx="3" fill="#94A3B8"/>
    <rect x="80" y="184" width="120" height="20" rx="6" fill="#F8FAFC"/>
    <rect x="92" y="190" width="80" height="8" rx="4" fill="#94A3B8"/>
  </g>
  <!-- node 2: process -->
  <g>
    <rect x="320" y="250" width="160" height="100" rx="14" fill="#FFFFFF" stroke="url(#ag1)" stroke-width="2"/>
    <circle cx="352" cy="282" r="16" fill="#8B5CF6" opacity="0.25"/>
    <text x="352" y="290" text-anchor="middle" font-family="Arial" font-size="18">🤖</text>
    <rect x="376" y="272" width="80" height="10" rx="5" fill="#0B1B3B"/>
    <rect x="376" y="288" width="60" height="6" rx="3" fill="#94A3B8"/>
    <rect x="340" y="314" width="120" height="20" rx="6" fill="#F8FAFC"/>
    <rect x="352" y="320" width="80" height="8" rx="4" fill="#94A3B8"/>
  </g>
  <!-- node 3a: output email -->
  <g>
    <rect x="600" y="120" width="160" height="100" rx="14" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2"/>
    <circle cx="632" cy="152" r="16" fill="#14B8A6" opacity="0.25"/>
    <text x="632" y="160" text-anchor="middle" font-family="Arial" font-size="18">📧</text>
    <rect x="656" y="142" width="80" height="10" rx="5" fill="#0B1B3B"/>
    <rect x="656" y="158" width="60" height="6" rx="3" fill="#94A3B8"/>
    <rect x="620" y="184" width="120" height="20" rx="6" fill="#F8FAFC"/>
    <rect x="632" y="190" width="80" height="8" rx="4" fill="#94A3B8"/>
  </g>
  <!-- node 3b: output db -->
  <g>
    <rect x="600" y="380" width="160" height="100" rx="14" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2"/>
    <circle cx="632" cy="412" r="16" fill="#14B8A6" opacity="0.25"/>
    <text x="632" y="420" text-anchor="middle" font-family="Arial" font-size="18">📊</text>
    <rect x="656" y="402" width="80" height="10" rx="5" fill="#0B1B3B"/>
    <rect x="656" y="418" width="60" height="6" rx="3" fill="#94A3B8"/>
    <rect x="620" y="444" width="120" height="20" rx="6" fill="#F8FAFC"/>
    <rect x="632" y="450" width="80" height="8" rx="4" fill="#94A3B8"/>
  </g>
  <!-- bottom status bar -->
  <rect x="0" y="540" width="800" height="60" fill="#FFFFFF"/>
  <circle cx="60" cy="570" r="8" fill="#34D399"/>
  <rect x="80" y="566" width="120" height="8" rx="4" fill="#0B1B3B"/>
  <rect x="660" y="558" width="100" height="24" rx="12" fill="url(#ag1)"/>
</svg>
