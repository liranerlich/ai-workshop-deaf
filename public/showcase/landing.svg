  <g>
    <rect x="520" y="420" width="200" height="110" rx="14" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="540" y="440" width="32" height="32" rx="8" fill="url(#lg1)"/>
    <rect x="540" y="486" width="120" height="10" rx="5" fill="#0B1B3B"/>
    <rect x="540" y="504" width="160" height="8" rx="4" fill="#94A3B8"/>
