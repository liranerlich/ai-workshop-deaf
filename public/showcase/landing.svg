  </defs>
  <rect width="800" height="600" fill="url(#lg1bg)"/>
  <!-- browser chrome -->
  <rect x="40" y="40" width="720" height="40" rx="10" fill="#E2E8F0"/>
  <circle cx="62" cy="60" r="6" fill="#FCA5A5"/>
  <circle cx="82" cy="60" r="6" fill="#FCD34D"/>
  <circle cx="102" cy="60" r="6" fill="#86EFAC"/>
  <rect x="280" y="50" width="240" height="20" rx="10" fill="#FFFFFF"/>
  <!-- page body -->
  <rect x="40" y="80" width="720" height="480" fill="#FFFFFF"/>
  <!-- top nav -->
  <rect x="80" y="110" width="80" height="14" rx="4" fill="#0B1B3B"/>
  <rect x="500" y="108" width="60" height="18" rx="9" fill="#F1F5F9"/>
  <rect x="570" y="108" width="60" height="18" rx="9" fill="#F1F5F9"/>
  <rect x="640" y="104" width="80" height="26" rx="13" fill="url(#lg1)"/>
  <!-- hero headline -->
  <rect x="80" y="180" width="420" height="22" rx="6" fill="#0B1B3B"/>
  <rect x="80" y="212" width="340" height="22" rx="6" fill="#0B1B3B"/>
  <rect x="80" y="248" width="380" height="10" rx="5" fill="#94A3B8"/>
  <rect x="80" y="266" width="320" height="10" rx="5" fill="#94A3B8"/>
  <rect x="80" y="284" width="260" height="10" rx="5" fill="#94A3B8"/>
  <!-- CTAs -->
  <rect x="80" y="320" width="150" height="42" rx="21" fill="url(#lg1)"/>
  <rect x="240" y="320" width="140" height="42" rx="21" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- right hero card -->
  <rect x="500" y="170" width="220" height="220" rx="20" fill="url(#lg1)" opacity="0.95"/>
  <rect x="520" y="195" width="60" height="10" rx="5" fill="#FFFFFF" opacity="0.5"/>
  <rect x="520" y="215" width="140" height="14" rx="7" fill="#FFFFFF"/>
  <rect x="520" y="240" width="100" height="10" rx="5" fill="#FFFFFF" opacity="0.6"/>
