<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="hg1" x1="0" x2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#FFF7ED"/>
  <!-- browser chrome -->
  <rect x="40" y="40" width="720" height="36" rx="10" fill="#E2E8F0"/>
  <circle cx="62" cy="58" r="6" fill="#FCA5A5"/>
  <circle cx="82" cy="58" r="6" fill="#FCD34D"/>
  <circle cx="102" cy="58" r="6" fill="#86EFAC"/>
  <rect x="40" y="76" width="720" height="484" fill="#FFFFFF"/>
  <!-- header -->
  <rect x="80" y="110" width="160" height="20" rx="6" fill="#0B1B3B"/>
  <rect x="80" y="138" width="240" height="8" rx="4" fill="#94A3B8"/>
