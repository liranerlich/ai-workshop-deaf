    <rect x="140" y="332" width="100" height="10" rx="5" fill="#0B1B3B"/>
    <rect x="140" y="350" width="60" height="8" rx="4" fill="#94A3B8"/>
    <rect x="100" y="380" width="160" height="10" rx="5" fill="#FBBF24"/>
  </g>
  <g>
    <rect x="300" y="310" width="200" height="100" rx="14" fill="#F8FAFC"/>
    <circle cx="330" cy="345" r="18" fill="#34D399" opacity="0.25"/>
    <text x="330" y="352" text-anchor="middle" font-family="Arial" font-size="20">🏠</text>
    <rect x="360" y="332" width="100" height="10" rx="5" fill="#0B1B3B"/>
