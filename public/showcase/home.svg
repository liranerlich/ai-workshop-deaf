  <!-- recent transactions -->
  <rect x="80" y="430" width="640" height="110" rx="14" fill="#F8FAFC"/>
  <rect x="100" y="450" width="120" height="10" rx="5" fill="#0B1B3B"/>
  <g>
    <rect x="100" y="475" width="600" height="20" rx="6" fill="#FFFFFF"/>
    <rect x="115" y="481" width="100" height="8" rx="4" fill="#0B1B3B"/>
