  <rect x="80" y="170" width="640" height="120" rx="16" fill="url(#hg1)"/>
  <rect x="100" y="190" width="80" height="8" rx="4" fill="#FFFFFF" opacity="0.7"/>
  <rect x="100" y="210" width="200" height="32" rx="6" fill="#FFFFFF"/>
  <rect x="100" y="252" width="120" height="8" rx="4" fill="#FFFFFF" opacity="0.7"/>
